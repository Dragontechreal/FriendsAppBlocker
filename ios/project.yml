name: ESPBlocker
options:
  bundleIdPrefix: com.espblocker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ESPBlocker:
    type: application
    platform: iOS
    sources:
      - path: ESPBlocker
        excludes:
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.espblocker.app
        CODE_SIGN_ENTITLEMENTS: ESPBlocker/ESPBlocker.entitlements
        DEVELOPMENT_TEAM: ""
    entitlements:
      path: ESPBlocker/ESPBlocker.entitlements
      properties:
        com.apple.developer.family-controls: true
    info:
      path: ESPBlocker/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSCameraUsageDescription: "Camera is used to scan the QR code on your ESP32 to unblock apps."
        CFBundleURLTypes:
          - CFBundleURLName: com.espblocker.app
            CFBundleURLSchemes:
              - espblocker

